[package]
name = "gpui_cosmic_text"
version = "0.1.0"
publish.workspace = true
edition.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_cosmic_text.rs"

[features]
default = []
font-kit = ["dep:font-kit"]

[dependencies]
anyhow.workspace = true
