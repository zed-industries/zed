[package]
name = "onboarding"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/onboarding.rs"

[features]
default = []

[dependencies]
agent_ui.workspace = true
anyhow.workspace = true
client.workspace = true
cloud_api_types.workspace = true
collections.workspace = true
component.workspace = true
db.workspace = true
documented.workspace = true
fs.workspace = true
fuzzy.workspace = true
gpui.workspace = true
menu.workspace = true
notifications.workspace = true
picker.workspace = true
project.workspace = true
schemars.workspace = true
serde.workspace = true
settings.workspace = true
telemetry.workspace = true
theme.workspace = true
theme_settings.workspace = true
ui.workspace = true
util.workspace = true
vim_mode_setting.workspace = true
workspace.workspace = true
zed_actions.workspace = true
zlog.workspace = true

[dev-dependencies]
db = {workspace = true, features = ["test-support"]}
fs = {workspace = true, features = ["test-support"]}
gpui = {workspace = true, features = ["test-support"]}
project = {workspace = true, features = ["test-support"]}
# `agent_ui` pulls in `remote_connection`; `workspace/test-support` turns on
# `remote/test-support` (which adds `RemoteConnectionOptions::Mock`). Enable
# `remote_connection/test-support` too so its match over that variant compiles.
remote_connection = {workspace = true, features = ["test-support"]}
settings = {workspace = true, features = ["test-support"]}
workspace = {workspace = true, features = ["test-support"]}
