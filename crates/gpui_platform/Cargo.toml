[package]
name = "gpui_platform"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_platform.rs"

[features]
default = []
font-kit = ["gpui_macos/font-kit"]
test-support = ["gpui/test-support", "gpui_macos/test-support"]
screen-capture = ["gpui/screen-capture", "gpui_macos/screen-capture", "gpui_windows/screen-capture", "gpui_linux/screen-capture"]
runtime_shaders = ["gpui_macos/runtime_shaders"]
wayland = ["gpui_linux/wayland"]
x11 = ["gpui_linux/x11"]
# Opt-in Android backend. Compiling for `target_os = "android"` without this
# feature gives you `gpui_platform` without the platform impl — useful for
# library crates that want their `Cargo.toml` to be Android-portable but
# don't want to pull in `gpui_android`'s wgpu/cosmic-text/JNI deps. Apps
# that actually run on Android must opt-in:
#
#   [target.'cfg(target_os = "android")'.dependencies]
#   gpui_platform = { ..., features = ["android"] }
#
# `current_platform()` panics with a clear message at runtime if Android is
# the target but the feature is off.
android = ["dep:gpui_android"]

[dependencies]
gpui.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
gpui_macos.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
gpui_windows.workspace = true
gpui = { workspace = true, features = ["windows-manifest"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
gpui_linux.workspace = true

[target.'cfg(target_os = "android")'.dependencies]
gpui_android = { workspace = true, optional = true }

[target.'cfg(target_family = "wasm")'.dependencies]
gpui_web.workspace = true
console_error_panic_hook = "0.1.7"
