[package]
name = "gpui_plugin"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"
description = "Guest-side GPUI platform that renders over the gpui:embedded WIT protocol"

# Deliberately not part of the zed workspace: this crate is only meaningful when compiled
# to wasm32-wasip2 as part of a plugin component.
[workspace]

[lib]
path = "src/gpui_plugin.rs"

[dependencies]
anyhow = "1.0"
futures = "0.3"
gpui = { path = "../../gpui", default-features = false }
gpui_embedded_shared = { path = "../shared" }
log = "0.4"
raw-window-handle = "0.6"
uuid = "1"
wit-bindgen = "0.41"
