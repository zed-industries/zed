[package]
name = "gpui_embedded"
version = "0.1.0"
edition.workspace = true
publish = false
license = "Apache-2.0"
description = "Experimental host for running GPUI-in-Wasm plugins embedded in a GPUI app"

[lints]
workspace = true

[lib]
path = "src/gpui_embedded.rs"

[[bin]]
name = "gpui_embedded_demo"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
env_logger.workspace = true
futures.workspace = true
gpui.workspace = true
gpui_embedded_shared = { path = "shared" }
gpui_platform = { workspace = true, features = ["font-kit", "wayland", "x11"] }
image.workspace = true
serde.workspace = true
log.workspace = true
smallvec.workspace = true
wasmtime.workspace = true
wasmtime-wasi.workspace = true

[dev-dependencies]
gpui = { workspace = true, features = ["test-support"] }
rand.workspace = true
