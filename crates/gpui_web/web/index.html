<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPUI Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            opacity: 0.6;
        }
        #loading.hidden {
            display: none;
        }
        #error {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
        }
        #error.visible {
            display: flex;
        }
        #error h2 {
            color: #f38ba8;
        }
        #error pre {
            max-width: 80ch;
            overflow: auto;
            background: #181825;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="loading">Loading GPUI…</div>
    <div id="error">
        <h2>Failed to initialize</h2>
        <pre id="error-message"></pre>
    </div>

    <script type="module">
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMsgEl = document.getElementById('error-message');

        function showError(message) {
            loadingEl.classList.add('hidden');
            errorMsgEl.textContent = message;
            errorEl.classList.add('visible');
        }

        async function run() {
            try {
                const { default: init } = await import('./pkg/hello_web.js');
                await init();
                loadingEl.classList.add('hidden');
            } catch (err) {
                console.error('GPUI Web initialization failed:', err);
                showError(String(err));
            }
        }

        run();
    </script>
</body>
</html>
