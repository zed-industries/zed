[package]
name = "http_proxy"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lints]
workspace = true

[lib]
path = "src/http_proxy.rs"

[features]
# Compiles in the `ZED_SANDBOX_PROXY_ALLOW_LOCAL_IPS` escape hatch that lets the
# proxy reach loopback/private/link-local addresses. This disables the proxy's
# DNS-rebinding/SSRF protection, so it must NEVER be enabled in a real Zed
# build (debug or release) — it exists solely for the NixOS sandbox integration
# tests, whose echo servers live on the VM's private network. Enabled only via
# `sandbox/nixos-test` when building `bwrap_test_helper`.
nixos-integration-tests = []

[dependencies]
anyhow.workspace = true
base64.workspace = true
futures.workspace = true
httparse.workspace = true
idna.workspace = true
log.workspace = true
percent-encoding.workspace = true
proxyvars.workspace = true
thiserror.workspace = true
url.workspace = true
