[package]
name = "gpui_apple"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_apple.rs"

[features]
default = ["gpui/default"]
test-support = ["gpui/test-support", "dep:image"]
runtime_shaders = []
font-kit = ["dep:font-kit"]

[dependencies]
gpui.workspace = true

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
anyhow.workspace = true
async-task.workspace = true
block = "0.1"
collections.workspace = true
core-foundation.workspace = true
core-foundation-sys.workspace = true
core-graphics = "0.24"
core-text = "21"
derive_more.workspace = true
dispatch2 = "0.3.1"
etagere = "0.2"
# WARNING: If you change this, you must also publish a new version of zed-font-kit to crates.io
font-kit = { git = "https://github.com/zed-industries/font-kit", rev = "94b0f28166665e8fd2f53ff6d268a14955c82269", package = "zed-font-kit", version = "0.14.1-zed", optional = true }
foreign-types = "0.5"
gpui_util.workspace = true
image = { workspace = true, optional = true }
libc.workspace = true
log.workspace = true
mach2.workspace = true
metal.workspace = true
objc.workspace = true
parking_lot.workspace = true
pathfinder_geometry = "0.5"
smallvec.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
core-video.workspace = true

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.build-dependencies]
cbindgen = { version = "0.28.0", default-features = false }
gpui.workspace = true

# When this crate is itself being tested (cargo test -p gpui_apple), its own
# cfg(test) flag enables impls of test-only traits like PlatformHeadlessRenderer.
# Those traits only exist in gpui when gpui's `test-support` feature is on, so
# we have to turn that feature on as a dev-dependency. The `cfg(test)` flag of a
# dependent crate doesn't propagate to its dependencies, but dev-dependencies
# do, so this is the correct way to enable the feature exactly when needed.
[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dev-dependencies]
gpui = { workspace = true, features = ["test-support"] }
image.workspace = true
