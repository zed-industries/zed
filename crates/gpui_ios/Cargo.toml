[package]
name = "gpui_ios"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_ios.rs"

[target.'cfg(target_os = "ios")'.dependencies]
anyhow.workspace = true
futures.workspace = true
gpui.workspace = true
gpui_apple = { workspace = true, features = ["font-kit"] }
objc.workspace = true
raw-window-handle = "0.6"
uuid.workspace = true

[dev-dependencies]
assets.workspace = true
# Physical devices can't read assets from the Mac's source tree the way the
# simulator can, so examples must embed them even in debug builds.
rust-embed = { workspace = true, features = ["debug-embed"] }
theme.workspace = true
ui.workspace = true

[[example]]
name = "todos"
path = "examples/todos.rs"
