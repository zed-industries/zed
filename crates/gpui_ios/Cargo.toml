[package]
name = "gpui_ios"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_ios.rs"

[features]
default = ["gpui/default"]
test-support = ["gpui/test-support"]
runtime_shaders = []

[build-dependencies]
cbindgen = "0.28"
gpui = { path = "../gpui", default-features = false }

[dependencies]
gpui.workspace = true

[target.'cfg(target_os = "ios")'.dependencies]
anyhow.workspace = true
async-task = "4.7"
block = "0.1"
cbindgen = "0.28"
collections.workspace = true
core-foundation.workspace = true
core-foundation-sys.workspace = true
core-graphics = "0.24"
core-text = "21"
derive_more.workspace = true
dispatch2 = "0.3.1"
etagere = "0.2"
font-kit = { git = "https://github.com/zed-industries/font-kit", rev = "110523127440aefb11ce0cf280ae7c5071337ec5", package = "zed-font-kit", version = "0.14.1-zed" }
foreign-types = "0.5"
futures.workspace = true
itertools.workspace = true
log.workspace = true
metal = { version = "0.33", default-features = false }
objc.workspace = true
parking_lot.workspace = true
pathfinder_geometry = "0.5"
raw-window-handle = "0.6"
smallvec.workspace = true
util.workspace = true
uuid.workspace = true
