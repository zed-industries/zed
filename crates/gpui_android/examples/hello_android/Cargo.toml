publish = false

[lib]
name = "hello_android"
crate-type = ["cdylib"]
path = "main.rs"

[dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }
gpui = { path = "../../../gpui" }
gpui_platform = { path = "../../../gpui_platform" }
log = "0.4"
