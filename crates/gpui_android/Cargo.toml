[package]
name = "gpui_android"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_android.rs"

[features]
default = []
test-support = ["gpui/test-support"]

[target.'cfg(target_os = "android")'.dependencies]
gpui.workspace = true
gpui_wgpu.workspace = true
anyhow.workspace = true
futures.workspace = true
log.workspace = true
parking_lot.workspace = true
uuid.workspace = true
raw-window-handle = "0.6"
ndk = "0.9"
android_logger = "0.14"
android-activity = { version = "0.6", features = ["game-activity"] }
# Matches the version android-activity uses, so we share the JNI types
# (JavaVM/JNIEnv/JObject) instead of pulling in two copies.
jni = "0.22"
