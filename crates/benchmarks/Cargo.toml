[package]
name = "benchmarks"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "GPL-3.0-or-later"

[lib]
path = "src/benchmarks.rs"
doctest = false

[lints]
workspace = true

[dev-dependencies]
acp_thread = { workspace = true, features = ["test-support"] }
action_log.workspace = true
agent = { workspace = true, features = ["test-support"] }
agent-client-protocol.workspace = true
agent_settings.workspace = true
agent_ui = { workspace = true, features = ["test-support"] }
assets.workspace = true
client = { workspace = true, features = ["test-support"] }
clock = { workspace = true, features = ["test-support"] }
criterion.workspace = true
editor = { workspace = true, features = ["test-support"] }
fs = { workspace = true, features = ["test-support"] }
futures.workspace = true
http_client = { workspace = true, features = ["test-support"] }
gpui = { workspace = true, features = ["bench"] }
gpui_platform = { workspace = true, features = ["test-support", "font-kit"] }
itertools.workspace = true
language = { workspace = true, features = ["test-support"] }
language_model = { workspace = true, features = ["test-support"] }
lsp = { workspace = true, features = ["test-support"] }
multi_buffer.workspace = true
node_runtime = { workspace = true, features = ["test-support"] }
project = { workspace = true, features = ["test-support"] }
prompt_store.workspace = true
rand.workspace = true
# `workspace/test-support` pulls in `remote/test-support` (which adds enum
# variants); these two make the matching test-support cfgs compile them.
remote_connection = { workspace = true, features = ["test-support"] }
serde_json.workspace = true
settings = { workspace = true, features = ["test-support"] }
terminal = { workspace = true, features = ["test-support"] }
text.workspace = true
theme = { workspace = true, features = ["test-support"] }
theme_settings.workspace = true
ui.workspace = true
util = { workspace = true, features = ["test-support"] }
workspace = { workspace = true, features = ["test-support"] }
zed_actions.workspace = true

[[bench]]
name = "editor_render"
harness = false

[[bench]]
name = "display_map"
harness = false

[[bench]]
name = "edit_file_tool"
harness = false

[[bench]]
name = "agent_panel"
harness = false
