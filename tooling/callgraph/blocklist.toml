# Blocklist of known-blocking functions.
#
# Each [[blocking]] entry defines a function path pattern that should not be
# called from async contexts. Patterns use `::` separators.
#
# Each [[safe_wrapper]] entry defines a function whose closure argument is an
# escape hatch — blocking calls inside it are intentional and not flagged.

# --- Filesystem I/O ---

[[blocking]]
path = "std::fs::read"
category = "filesystem"
help = "use an async fs API or wrap in `smol::unblock`"

[[blocking]]
path = "std::fs::read_to_string"
category = "filesystem"
help = "use an async fs API or wrap in `smol::unblock`"

