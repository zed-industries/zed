# --- Thread blocking ---

[[blocking]]
path = "std::thread::sleep"
category = "thread"
help = "use `cx.background_executor().timer(duration).await`"

[[blocking]]
path = "std::thread::park"
category = "thread"
help = "use an async synchronization primitive"

# --- Synchronization (std) ---

[[blocking]]
path = "std::sync::Mutex::lock"
category = "sync-lock"
help = "use `parking_lot::Mutex` (non-poisoning, shorter hold) or an async mutex"

[[blocking]]
path = "std::sync::RwLock::read"
category = "sync-lock"
help = "use an async RwLock"

[[blocking]]
path = "std::sync::RwLock::write"
category = "sync-lock"
help = "use an async RwLock"

# --- Synchronization (parking_lot) — pedantic tier ---

[[blocking]]
path = "parking_lot::Mutex::lock"
category = "sync-lock"
tier = "pedantic"
help = "consider an async mutex if held across await points"

[[blocking]]
path = "parking_lot::RwLock::read"
category = "sync-lock"
tier = "pedantic"
help = "consider an async RwLock if held across await points"

[[blocking]]
path = "parking_lot::RwLock::write"
category = "sync-lock"
tier = "pedantic"
help = "consider an async RwLock if held across await points"

