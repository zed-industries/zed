name: Guild Shipped Backfill

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log changes without making them)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

