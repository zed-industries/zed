name: Release
on:
  push:
    tags: ["v*"]
jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
    runs-on: "${{ matrix.os }}"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"
      - run: cargo build --release --target "${{ matrix.target }}"
        env:
          CARGO_TERM_COLOR: always
      - run: |
          mkdir -p dist
          cd target/"${{ matrix.target }}"/release
          tar czf ../../../../dist/zed-"${{ matrix.suffix }}".tar.gz zed
      - uses: actions/upload-artifact@v4
        with:
          name: "zed-${{ matrix.suffix }}"
          path: dist/zed-${{ matrix.suffix }}.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ libasound2-dev libfontconfig-dev \
            libgit2-dev libglib2.0-dev libssl-dev libva-dev libvulkan1 \
            libwayland-dev libx11-xcb-dev libxkbcommon-x11-dev libzstd-dev \
            make cmake clang lld llvm jq curl gettext-base \
            libsqlite3-dev musl-tools
      - run: cargo build --release
        env:
          CARGO_TERM_COLOR: always
      - run: |
          mkdir -p dist
          cd target/release
          tar czf ../../dist/zed-linux-x86_64.tar.gz zed
      - uses: actions/upload-artifact@v4
        with:
          name: zed-linux-x86_64
          path: dist/zed-linux-x86_64.tar.gz

  create-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p dist
          cp zed-*/zed-*.tar.gz dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/zed-*.tar.gz
          generate_release_notes: true
