# Labels pull requests by author:
#  - 'community champion' for community champions
#  - 'bot' for bot accounts
#  - 'staff' for staff team members
#  - 'guild' for guild members
#  - 'first contribution' for first-time external contributors
# Labels issues by author:
#  - 'community champion' for community champions

name: PR Labeler

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  check-authorship-and-label:
    if: github.repository == 'zed-industries/zed'
    runs-on: namespace-profile-2x4-ubuntu-2404
    timeout-minutes: 5
    steps:
      - id: get-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.ZED_COMMUNITY_BOT_APP_ID }}
          private-key: ${{ secrets.ZED_COMMUNITY_BOT_PRIVATE_KEY }}
          owner: zed-industries

      - id: apply-authorship-label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ steps.get-app-token.outputs.token }}
          script: |
            const BOT_LABEL = 'bot';
            const STAFF_LABEL = 'staff';
            const FIRST_CONTRIBUTION_LABEL = 'first contribution';
            const COMMUNITY_CHAMPION_LABEL = 'community champion';
            const GUILD_LABEL = 'guild';
            const GUILD_MEMBERS = [
              '11happy',
              'AidanV',
              'AmaanBilwar',
              'MostlyKIGuess',
              'OmChillure',
              'Palanikannan1437',
              'Shivansh-25',
              'SkandaBhat',
              'TwistingTwists',
              'YEDASAVG',
              'Ziqi-Yang',
              'alanpjohn',
              'arjunkomath',
              'austincummings',
              'ayushk-1801',
              'criticic',
              'dongdong867',
              'emamulandalib',
              'eureka928',
              'feitreim',
              'iam-liam',
              'iksuddle',
              'ishaksebsib',
              'lingyaochu',
              'loadingalias',
              'marcocondrache',
              'mchisolm0',
              'nairadithya',
              'nihalxkumar',
              'notJoon',
              'polyesterswing',
              'prayanshchh',
              'razeghi71',
              'sarmadgulzar',
              'seanstrom',
              'th0jensen',
              'tommyming',
              'transitoryangel',
              'virajbhartiya',
            ];
            const COMMUNITY_CHAMPIONS = [
              '0x2CA',
              '5brian',
              '5herlocked',
              'abdelq',
              'afgomez',
              'AidanV',
              'akbxr',
              'AlvaroParker',
              'amtoaer',
              'artemevsevev',
              'bajrangCoder',
              'bcomnes',
              'Be-ing',
              'blopker',
              'bnjjj',
              'bobbymannino',
              'CharlesChen0823',
              'chbk',
              'davewa',
              'davidbarsky',
              'ddoemonn',
              'djsauble',
              'errmayank',
              'fantacell',
              'fdncred',
              'findrakecil',
              'FloppyDisco',
              'gko',
              'huacnlee',
              'imumesh18',
              'injust',
              'jacobtread',
              'jansol',
              'jeffreyguenther',
              'jenslys',
              'jongretar',
              'lemorage',
              'lingyaochu',
              'lnay',
              'marcocondrache',
              'marius851000',
              'mikebronner',
              'ognevny',
              'PKief',
              'playdohface',
              'RemcoSmitsDev',
              'rgbkrk',
              'romaninsh',
              'rxptr',
              'Simek',
              'someone13574',
              'sourcefrog',
              'suxiaoshao',
              'Takk8IS',
              'tartarughina',
              'thedadams',
              'tidely',
              'timvermeulen',
              'valentinegb',
              'versecafe',
              'vitallium',
              'WhySoBad',
              'ya7010',
              'Zertsov',
            ];

            const pr = context.payload.pull_request;
            const issue = context.payload.issue;
            const target = pr || issue;
            const targetType = pr ? 'PR' : 'issue';
            const author = target.user.login;
            const authorLower = author.toLowerCase();

            const listIncludesAuthor = (members) => members.some(
              (member) => member.toLowerCase() === authorLower
            );

            const labelsToAdd = [];
            const isBot = target.user.type === 'Bot';
            let isStaff = false;

            if (!isBot) {
              try {
                const response = await github.rest.teams.getMembershipForUserInOrg({
                  org: 'zed-industries',
                  team_slug: STAFF_LABEL,
                  username: author
                });
                isStaff = response.data.state === 'active';
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (pr && isBot) {
              labelsToAdd.push(BOT_LABEL);
            } else if (pr && isStaff) {
              labelsToAdd.push(STAFF_LABEL);
            } else if (!isBot && !isStaff) {
              if (listIncludesAuthor(COMMUNITY_CHAMPIONS)) {
                labelsToAdd.push(COMMUNITY_CHAMPION_LABEL);
              }

              if (pr) {
                if (listIncludesAuthor(GUILD_MEMBERS)) {
                  labelsToAdd.push(GUILD_LABEL);
                }

                // We use inverted logic here due to a suspected GitHub bug where first-time contributors
                // get 'NONE' instead of 'FIRST_TIME_CONTRIBUTOR' or 'FIRST_TIMER'.
                // https://github.com/orgs/community/discussions/78038
                // This will break if GitHub ever adds new associations.
                const association = pr.author_association;
                const knownAssociations = ['CONTRIBUTOR', 'COLLABORATOR', 'MEMBER', 'OWNER', 'MANNEQUIN'];

                if (knownAssociations.includes(association)) {
                  console.log(`PR #${pr.number} by ${author}: not a first-time contributor (association: '${association}')`);
                } else {
                  labelsToAdd.push(FIRST_CONTRIBUTION_LABEL);
                }
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: target.number,
                labels: labelsToAdd
              });

              const labels = labelsToAdd.map((label) => `'${label}'`).join(', ');
              console.log(`${targetType} #${target.number} by ${author}: labeled ${labels}`);
            }
