# Generated from xtask::workflows::bump_patch_version
# Rebuild with `cargo xtask workflows`.
name: bump_patch_version
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name to run on
        required: true
        type: string
      retag:
        description: Re-tag the current version instead of bumping (force-updates the tag)
        type: boolean
        default: 'false'
jobs:
  run_bump_patch_version:
    if: (github.repository_owner == 'zed-industries' || github.repository_owner == 'zed-extensions')
    runs-on: namespace-profile-16x32-ubuntu-2204
    steps:
    - id: generate-token
      name: steps::authenticate_as_zippy
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.ZED_ZIPPY_APP_ID }}
        private-key: ${{ secrets.ZED_ZIPPY_APP_PRIVATE_KEY }}
    - name: steps::checkout_repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        clean: false
        ref: ${{ inputs.branch }}
        token: ${{ steps.generate-token.outputs.token }}
    - id: channel
      name: bump_patch_version::run_bump_patch_version::read_channel
      run: |
        channel="$(cat crates/zed/RELEASE_CHANNEL)"

        tag_suffix=""
        case $channel in
          stable)
            ;;
          preview)
            tag_suffix="-pre"
            ;;
          *)
            echo "::error::must be run on a stable or preview release branch"
            exit 1
            ;;
        esac

        echo "channel=$channel" >> "$GITHUB_OUTPUT"
        echo "tag_suffix=$tag_suffix" >> "$GITHUB_OUTPUT"
    - name: bump_patch_version::run_bump_patch_version
      if: inputs.retag != true
      uses: taiki-e/install-action@02cc5f8ca9f2301050c0c099055816a41ee05507
      with:
        tool: cargo-edit
    - name: bump_patch_version::run_bump_patch_version::bump_version
      if: inputs.retag != true
      run: cargo set-version -p zed --bump patch
    - id: version
      name: bump_patch_version::run_bump_patch_version::resolve_version
      run: |
        version=$(script/get-crate-version zed)
        {
            echo "version=$version"
            echo "head_sha=$(git rev-parse HEAD)"
        } >> "$GITHUB_OUTPUT"
    - name: bump_patch_version::run_bump_patch_version::verify_no_existing_release
      run: |
        released=$(script/get-released-version "$CHANNEL" "$VERSION")
        if [[ "$released" == "$VERSION" ]]; then
            echo "::error::version $VERSION is already released on $CHANNEL"
            exit 1
        fi
      env:
        CHANNEL: ${{ steps.channel.outputs.channel }}
        VERSION: ${{ steps.version.outputs.version }}
    - id: commit
      name: steps::bot_commit
      if: inputs.retag != true
      uses: IAreKyleW00t/verified-bot-commit@126a6a11889ab05bcff72ec2403c326cd249b84c
      with:
        message: Bump to ${{ steps.version.outputs.version }} for @${{ github.actor }}
        ref: refs/heads/${{ inputs.branch }}
        files: '**'
        token: ${{ steps.generate-token.outputs.token }}
    - name: steps::create_tag
      if: inputs.retag != true
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
      with:
        script: |
          github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ steps.version.outputs.version }}${{ steps.channel.outputs.tag_suffix }}',
              sha: '${{ steps.commit.outputs.commit }}'
          })
        github-token: ${{ steps.generate-token.outputs.token }}
    - name: steps::update_tag
      if: inputs.retag == true
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
      with:
        script: |
          github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ steps.version.outputs.version }}${{ steps.channel.outputs.tag_suffix }}',
              sha: '${{ steps.version.outputs.head_sha }}',
          force: true
          })
        github-token: ${{ steps.generate-token.outputs.token }}
concurrency:
  group: ${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euxo pipefail {0}
