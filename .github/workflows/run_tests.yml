# Simplified CI: only format and clippy checks
name: run_tests
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'
on:
  pull_request:
    branches:
    - '**'
  push:
    branches:
    - main
jobs:
  check_fmt:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: cargo_fmt
      run: cargo fmt --all -- --check
    timeout-minutes: 60
  clippy:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: cache_cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-
    - name: setup_linux
      run: ./script/linux
    - name: clippy
      run: cargo clippy --all-targets --all-features -- --deny warnings
    timeout-minutes: 120
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -euxo pipefail {0}
